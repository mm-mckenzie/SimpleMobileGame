<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- PWA / install -->
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS-specific install support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mycelium" />
  <link rel="apple-touch-icon" href="./icon-180.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="./icon-120.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="./icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="./icon-167.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png" />

  <title>MYCELIUM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0e1a;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas { display: block; touch-action: none; }

    /* ── Install banner ─────────────────────────────────────── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 9999;
      background: #0d1225;
      border-top: 2px solid #00ffcc;
      padding: 14px 16px 20px;
      font-family: monospace;
      color: #fff;
      flex-direction: column;
      gap: 8px;
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    #install-banner .banner-title {
      font-size: 15px;
      color: #00ffcc;
      font-weight: bold;
      letter-spacing: 1px;
    }
    #install-banner .banner-steps {
      font-size: 13px;
      color: #aabbcc;
      line-height: 1.7;
    }
    #install-banner .banner-steps span {
      color: #fff;
      background: #1e3060;
      border-radius: 4px;
      padding: 1px 6px;
      white-space: nowrap;
    }
    #install-banner .banner-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    #install-banner .dismiss {
      background: none;
      border: 1px solid #334455;
      color: #889aaa;
      font-family: monospace;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 10px;
      border-radius: 6px;
      flex-shrink: 0;
      margin-left: 12px;
    }
    #install-banner .android-btn {
      margin-top: 4px;
      background: #00ffcc22;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      font-family: monospace;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      letter-spacing: 1px;
    }
  </style>
  <script type="module" crossorigin src="/SimpleMobileGame/assets/index-CdgRM4TL.js"></script>
<link rel="manifest" href="/SimpleMobileGame/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/SimpleMobileGame/registerSW.js"></script></head>
<body>
  <!-- Install banner — hidden when already running as installed PWA -->
  <div id="install-banner">
    <div class="banner-row">
      <div>
        <div class="banner-title">⬡ Install MYCELIUM</div>
        <div class="banner-steps" id="banner-text"></div>
      </div>
      <button class="dismiss" onclick="dismissBanner()">✕</button>
    </div>
    <!-- Android gets a real install button -->
    <button class="android-btn" id="android-install-btn" style="display:none" onclick="triggerAndroidInstall()">
      ＋ Add to Home Screen
    </button>
  </div>

  <script>
    (function () {
      // Don't show if already installed as a PWA
      const isStandalone =
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
      if (isStandalone) return;

      // Don't show if dismissed in the last 7 days
      const dismissed = localStorage.getItem('install_dismissed');
      if (dismissed && Date.now() - parseInt(dismissed) < 7 * 24 * 60 * 60 * 1000) return;

      const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isAndroid = /android/i.test(navigator.userAgent);

      const banner = document.getElementById('install-banner');
      const text   = document.getElementById('banner-text');

      if (isIOS) {
        text.innerHTML =
          '1. Tap the <span>Share ↑</span> button in Safari<br>' +
          '2. Scroll down and tap <span>Add to Home Screen</span><br>' +
          '3. Tap <span>Add</span> — plays like a native app, works offline!';
        banner.style.display = 'flex';
      } else if (isAndroid) {
        text.innerHTML = 'Install for the full-screen experience and offline play.';
        document.getElementById('android-install-btn').style.display = 'block';
        banner.style.display = 'flex';
      } else {
        // Desktop — subtle one-liner
        text.innerHTML = 'Open on your phone in Safari and tap <span>Share ↑ → Add to Home Screen</span> to install.';
        banner.style.display = 'flex';
      }

      // Capture Android install prompt
      window._deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window._deferredInstallPrompt = e;
      });

      window.triggerAndroidInstall = function () {
        if (window._deferredInstallPrompt) {
          window._deferredInstallPrompt.prompt();
          window._deferredInstallPrompt.userChoice.then(function () {
            dismissBanner();
          });
        }
      };

      window.dismissBanner = function () {
        banner.style.display = 'none';
        localStorage.setItem('install_dismissed', Date.now().toString());
      };
    })();
  </script>

</body>
</html>
